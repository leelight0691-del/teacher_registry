<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교직원 연수 등록부</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { margin: 0; padding: 0; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background-color: #f8f9fc; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useCallback } = React;

    // 파이어베이스 모듈 불러오기 (설치 없이 인터넷으로 연결)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDZ8Ljhd3yWHLWycPYnFO8eYnK1xWenIOY",
      authDomain: "sign-e8e62.firebaseapp.com",
      databaseURL: "https://sign-e8e62-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "sign-e8e62",
      storageBucket: "sign-e8e62.firebasestorage.app",
      messagingSenderId: "1060197129585",
      appId: "1:1060197129585:web:c6cce61a15d73ad4e1ead0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMIN_PASSWORD = "admin1234";
    const ABSENCE_REASONS = ["출장", "병가", "연가", "조퇴", "공가", "육아시간"];

    // 파이어스토어 실시간 연동 훅
    function useStorage(key, defaultVal) {
      const [val, setVal] = useState(defaultVal);

      useEffect(() => {
        const docRef = doc(db, "registry", key);
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            setVal(docSnap.data().value);
          } else {
            setVal(defaultVal);
          }
        });
        return () => unsubscribe();
      }, [key, defaultVal]);

      const save = useCallback(async (v) => {
        const next = typeof v === "function" ? v(val) : v;
        setVal(next); 
        try {
          const docRef = doc(db, "registry", key);
          await setDoc(docRef, { value: next }, { merge: true });
        } catch (error) {
          console.error("데이터 저장 실패:", error);
        }
      }, [key, val]);

      return [val, save];
    }

    function SignatureCanvas({ onSave, onClear, existingSig }) {
      const canvasRef = useRef(null);
      const drawing = useRef(false);
      const lastPos = useRef(null);

      useEffect(() => {
        if (existingSig && canvasRef.current) {
          const img = new Image();
          img.onload = () => {
            const ctx = canvasRef.current.getContext("2d");
            ctx.clearRect(0, 0, 400, 160);
            ctx.drawImage(img, 0, 0);
          };
          img.src = existingSig;
        }
      }, [existingSig]);

      const getPos = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        if (e.touches) {
          return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
      };

      const startDraw = (e) => {
        e.preventDefault();
        drawing.current = true;
        const pos = getPos(e, canvasRef.current);
        lastPos.current = pos;
      };

      const draw = (e) => {
        e.preventDefault();
        if (!drawing.current) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const pos = getPos(e, canvas);
        ctx.beginPath();
        ctx.moveTo(lastPos.current.x, lastPos.current.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = "#1a1a2e";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
        lastPos.current = pos;
      };

      const endDraw = () => { drawing.current = false; };

      const clear = () => {
        const ctx = canvasRef.current.getContext("2d");
        ctx.clearRect(0, 0, 400, 160);
        onClear && onClear();
      };

      const save = () => {
        const data = canvasRef.current.toDataURL("image/png");
        onSave(data);
      };

      return (
        <div>
          <canvas
            ref={canvasRef}
            width={400}
            height={160}
            style={{ border: "1px solid #c8d0e0", borderRadius: 8, touchAction: "none", cursor: "crosshair", width: "100%", background: "#f8f9fb" }}
            onMouseDown={startDraw}
            onMouseMove={draw}
            onMouseUp={endDraw}
            onMouseLeave={endDraw}
            onTouchStart={startDraw}
            onTouchMove={draw}
            onTouchEnd={endDraw}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={clear} style={{ flex: 1, padding: "8px", background: "#f0f2f5", border: "1px solid #dde1e9", borderRadius: 8, cursor: "pointer", fontSize: 13 }}>지우기</button>
            <button onClick={save} style={{ flex: 2, padding: "8px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500 }}>서명 저장</button>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [adminLoggedIn, setAdminLoggedIn] = useState(false);
      const [adminPw, setAdminPw] = useState("");
      const [pwError, setPwError] = useState(false);
      
      const [teachers, setTeachers] = useStorage("teachers_v2", []);
      const [trainings, setTrainings] = useStorage("trainings_v2", []);
      const [signatures, setSignatures] = useStorage("signatures_v2", {});
      
      const [newTraining, setNewTraining] = useState({ name: "", org: "", date: "", time: "" });
      const [editTitleId, setEditTitleId] = useState(null);
      const [editTitleVal, setEditTitleVal] = useState("");
      const [selectedTraining, setSelectedTraining] = useState(null);
      const [selectedTeacher, setSelectedTeacher] = useState(null);
      const [absenceReason, setAbsenceReason] = useState("");
      const [sigSaved, setSigSaved] = useState(false);
      const [uploadError, setUploadError] = useState("");
      const [activeAdminTab, setActiveAdminTab] = useState("teachers");
      const [copiedId, setCopiedId] = useState(null);
      const [newTeacherName, setNewTeacherName] = useState("");

      const urlParams = new URLSearchParams(window.location.search);
      const sharedTrainingId = urlParams.get("training");

      useEffect(() => {
        if (sharedTrainingId) {
          setPage("sharedTraining");
        }
      }, [sharedTrainingId]);

      const getSigKey = (tId, tName) => `${tId}__${tName}`;

      const handleAdminLogin = () => {
        if (adminPw === ADMIN_PASSWORD) {
          setAdminLoggedIn(true);
          setPage("admin");
          setPwError(false);
        } else {
          setPwError(true);
        }
      };

      const addTraining = () => {
        if (!newTraining.name || !newTraining.date) return;
        const t = { ...newTraining, id: Date.now().toString(), createdAt: new Date().toISOString() };
        setTrainings(prev => [t, ...prev]);
        setNewTraining({ name: "", org: "", date: "", time: "" });
      };

      const deleteTraining = (id) => {
        if (confirm("연수를 삭제하시겠습니까?")) setTrainings(prev => prev.filter(t => t.id !== id));
      };

      const saveEditTitle = (id) => {
        setTrainings(prev => prev.map(t => t.id === id ? { ...t, name: editTitleVal } : t));
        setEditTitleId(null);
      };

      const getTrainingLink = (training) => {
        const url = new URL(window.location.href.split("?")[0]);
        url.searchParams.set("training", training.id);
        return url.toString();
      };

      const copyLink = async (training) => {
        try {
          await navigator.clipboard.writeText(getTrainingLink(training));
          setCopiedId(training.id);
          setTimeout(() => setCopiedId(null), 2000);
        } catch { alert(getTrainingLink(training)); }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploadError("");
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const lines = ev.target.result.split("\n").map(l => l.trim()).filter(Boolean);
            const names = lines.map(l => l.split(",")[0].trim()).filter(Boolean);
            if (names.length === 0) { setUploadError("이름을 찾을 수 없습니다."); return; }
            setTeachers(names.map((name, i) => ({ id: `t${Date.now()}${i}`, name })));
          } catch { setUploadError("파일 파싱 오류입니다."); }
        };
        reader.readAsText(file);
      };

      const downloadTemplate = () => {
        const content = "이름\n홍길동\n김철수\n이영희\n박민준";
        const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "교직원명단_양식.csv";
        a.click();
      };

      const saveSignature = async (sig) => {
        const key = getSigKey(selectedTraining.id, selectedTeacher.name);
        await setSignatures(prev => ({ ...prev, [key]: { sig, absenceReason, timestamp: new Date().toISOString() } }));
        setSigSaved(true);
      };

      const getSignedCount = (trainingId) => {
        return teachers.filter(t => {
          const k = getSigKey(trainingId, t.name);
          return signatures[k]?.sig;
        }).length;
      };

      const getAbsentCount = (trainingId) => {
        return teachers.filter(t => {
          const k = getSigKey(trainingId, t.name);
          return signatures[k]?.absenceReason && !signatures[k]?.sig;
        }).length;
      };

      const printResult = (training) => {
        const rows = teachers.map(t => {
          const k = getSigKey(training.id, t.name);
          const s = signatures[k];
          return `<tr><td>${t.name}</td><td style="text-align:center">${s?.sig ? `<img src="${s.sig}" height="40"/>` : "-"}</td><td style="text-align:center">${s?.absenceReason || (s?.sig ? "참석" : "-")}</td><td style="font-size:11px;color:#888">${s?.timestamp ? new Date(s.timestamp).toLocaleString("ko-KR") : ""}</td></tr>`;
        }).join("");
        const w = window.open("", "_blank");
        w.document.write(`<html><head><title>${training.name} 서명부</title><style>body{font-family:sans-serif;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ccc;padding:8px}th{background:#f0f4ff}</style></head><body>
          <h2>${training.name}</h2>
          <p>기관: ${training.org || "-"} | 일시: ${training.date} ${training.time || ""}</p>
          <table><thead><tr><th>성명</th><th>서명</th><th>비고</th><th>서명시각</th></tr></thead><tbody>${rows}</tbody></table>
        </body></html>`);
        w.document.close();
        w.print();
      };

      const currentTrainingObj = sharedTrainingId ? trainings.find(t => t.id === sharedTrainingId) : selectedTraining;

      if (page === "sharedTraining" || (page === "teacherSign" && currentTrainingObj)) {
        const training = currentTrainingObj;
        if (!training) return (
          <div style={{ padding: 40, textAlign: "center" }}>
            <p style={{ color: "#888" }}>연수를 찾을 수 없습니다.</p>
            <button onClick={() => { setPage("home"); setSelectedTraining(null); }} style={{ marginTop: 12, padding: "8px 20px", borderRadius: 8, border: "1px solid #ddd", cursor: "pointer", background: "#fff" }}>홈으로</button>
          </div>
        );

        if (selectedTeacher) {
          const key = getSigKey(training.id, selectedTeacher.name);
          const existing = signatures[key];
          return (
            <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px" }}>
              <button onClick={() => { setSelectedTeacher(null); setSigSaved(false); setAbsenceReason(""); }} style={{ background: "none", border: "none", color: "#2c5faf", cursor: "pointer", fontSize: 14, marginBottom: 16 }}>← 명단으로</button>
              <div style={{ background: "#f0f4ff", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
                <p style={{ fontSize: 12, color: "#6b7aaa", margin: 0 }}>{training.name}</p>
                <h2 style={{ margin: "4px 0 0", fontSize: 20, color: "#1a2050" }}>{selectedTeacher.name} 선생님</h2>
              </div>

              {sigSaved ? (
                <div style={{ textAlign: "center", padding: 32 }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
                  <p style={{ color: "#2c5faf", fontWeight: 500, fontSize: 18 }}>서명이 완료되었습니다</p>
                  {absenceReason && <p style={{ color: "#e06030", marginTop: 8 }}>불참 사유: {absenceReason}</p>}
                  <button onClick={() => { setSelectedTeacher(null); setSigSaved(false); setAbsenceReason(""); }} style={{ marginTop: 20, padding: "10px 28px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500 }}>확인</button>
                </div>
              ) : (
                <>
                  <div style={{ marginBottom: 20 }}>
                    <p style={{ fontSize: 14, fontWeight: 500, color: "#444", marginBottom: 10 }}>불참 사유 (해당 시 선택)</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {ABSENCE_REASONS.map(r => (
                        <button key={r} onClick={() => setAbsenceReason(absenceReason === r ? "" : r)}
                          style={{ padding: "7px 14px", borderRadius: 20, fontSize: 13, cursor: "pointer", background: absenceReason === r ? "#e06030" : "#fff", color: absenceReason === r ? "#fff" : "#555", border: absenceReason === r ? "1.5px solid #e06030" : "1px solid #ddd", fontWeight: absenceReason === r ? 500 : 400, transition: "all 0.15s" }}>
                          {r}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div style={{ marginBottom: 8 }}>
                    <p style={{ fontSize: 14, fontWeight: 500, color: "#444", marginBottom: 8 }}>전자서명</p>
                    <SignatureCanvas
                      existingSig={existing?.sig}
                      onSave={saveSignature}
                      onClear={() => {}}
                    />
                  </div>
                  {absenceReason && (
                    <button onClick={() => { setSignatures(prev => ({ ...prev, [key]: { sig: null, absenceReason, timestamp: new Date().toISOString() } })); setSigSaved(true); }}
                      style={{ marginTop: 12, width: "100%", padding: "10px", background: "#e06030", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, fontSize: 14 }}>
                      불참 사유로 제출
                    </button>
                  )}
                </>
              )}
            </div>
          );
        }

        return (
          <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px" }}>
            <div style={{ background: "linear-gradient(135deg,#2c5faf,#1a3880)", borderRadius: 14, padding: "20px 24px", marginBottom: 24, color: "#fff" }}>
              <p style={{ fontSize: 11, opacity: 0.7, margin: "0 0 4px", letterSpacing: 1 }}>연수 서명</p>
              <h2 style={{ margin: "0 0 6px", fontSize: 20 }}>{training.name}</h2>
              {training.org && <p style={{ margin: "0 0 2px", fontSize: 13, opacity: 0.85 }}>📍 {training.org}</p>}
              <p style={{ margin: 0, fontSize: 13, opacity: 0.85 }}>📅 {training.date} {training.time && `⏰ ${training.time}`}</p>
            </div>
            <p style={{ fontSize: 14, color: "#555", marginBottom: 16 }}>이름을 클릭하여 서명하세요</p>
            {teachers.length === 0 ? (
              <p style={{ color: "#aaa", textAlign: "center", padding: 32 }}>등록된 교직원이 없습니다.</p>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {teachers.map(t => {
                  const k = getSigKey(training.id, t.name);
                  const s = signatures[k];
                  const signed = !!s?.sig;
                  const absent = !!s?.absenceReason && !s?.sig;
                  return (
                    <button key={t.id} onClick={() => { setSelectedTeacher(t); setSigSaved(false); setAbsenceReason(s?.absenceReason || ""); }}
                      style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 18px", background: signed ? "#eef6ee" : absent ? "#fff4f0" : "#fff", border: `1px solid ${signed ? "#a8d5a8" : absent ? "#f5c4b3" : "#dde1e9"}`, borderRadius: 10, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
                      <span style={{ fontWeight: 500, fontSize: 15, color: "#222" }}>{t.name}</span>
                      <span style={{ fontSize: 12, padding: "3px 10px", borderRadius: 12, background: signed ? "#d4eed4" : absent ? "#fde8de" : "#f0f2f8", color: signed ? "#2a762a" : absent ? "#c04020" : "#888", fontWeight: 500 }}>
                        {signed ? "서명완료" : absent ? s.absenceReason : "미서명"}
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      if (page === "admin") {
        return (
          <div style={{ maxWidth: 820, margin: "0 auto", padding: "24px 16px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
              <div>
                <p style={{ fontSize: 11, color: "#888", margin: 0, letterSpacing: 1 }}>ADMIN</p>
                <h1 style={{ margin: 0, fontSize: 22, color: "#1a2050" }}>관리자 대시보드</h1>
              </div>
              <button onClick={() => { setAdminLoggedIn(false); setPage("home"); }} style={{ padding: "8px 16px", background: "#fff", border: "1px solid #ddd", borderRadius: 8, cursor: "pointer", fontSize: 13, color: "#555" }}>로그아웃</button>
            </div>

            <div style={{ display: "flex", gap: 0, marginBottom: 24, background: "#f0f2f8", borderRadius: 10, padding: 4 }}>
              {[["teachers", "👥 교직원 관리"], ["trainings", "📋 연수 관리"], ["results", "📊 결과 확인"]].map(([id, label]) => (
                <button key={id} onClick={() => setActiveAdminTab(id)}
                  style={{ flex: 1, padding: "9px 0", background: activeAdminTab === id ? "#fff" : "transparent", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: activeAdminTab === id ? 500 : 400, color: activeAdminTab === id ? "#2c5faf" : "#666", transition: "all 0.15s", boxShadow: activeAdminTab === id ? "0 1px 4px rgba(0,0,0,0.08)" : "none" }}>
                  {label}
                </button>
              ))}
            </div>

            {activeAdminTab === "teachers" && (
              <div>
                <div style={{ background: "#fff", border: "1px solid #e5e8f0", borderRadius: 12, padding: "20px" }}>
                  <h3 style={{ margin: "0 0 16px", fontSize: 15, color: "#333" }}>교직원 명단</h3>
                  <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                    <button onClick={downloadTemplate} style={{ padding: "8px 14px", background: "#eef2ff", border: "1px solid #c5d0f0", borderRadius: 8, cursor: "pointer", fontSize: 13, color: "#3050a0" }}>📥 양식 다운로드</button>
                    <label style={{ padding: "8px 14px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500 }}>
                      📤 명단 업로드 (CSV)
                      <input type="file" accept=".csv,.txt" onChange={handleFileUpload} style={{ display: "none" }} />
                    </label>
                  </div>
                  {uploadError && <p style={{ color: "#c03020", fontSize: 13, marginBottom: 10 }}>{uploadError}</p>}
                  <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                    <input value={newTeacherName} onChange={e => setNewTeacherName(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && newTeacherName.trim()) { setTeachers(prev => [...prev, { id: `t${Date.now()}`, name: newTeacherName.trim() }]); setNewTeacherName(""); } }} placeholder="이름 직접 추가" style={{ flex: 1, padding: "8px 12px", border: "1px solid #dde", borderRadius: 8, fontSize: 13 }} />
                    <button onClick={() => { if (newTeacherName.trim()) { setTeachers(prev => [...prev, { id: `t${Date.now()}`, name: newTeacherName.trim() }]); setNewTeacherName(""); } }} style={{ padding: "8px 14px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13 }}>추가</button>
                  </div>
                  {teachers.length === 0 ? (
                    <p style={{ color: "#aaa", textAlign: "center", padding: "20px 0" }}>CSV를 업로드하거나 이름을 추가하세요</p>
                  ) : (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 8 }}>
                      {teachers.map(t => (
                        <div key={t.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", background: "#f8f9fc", borderRadius: 8, fontSize: 14 }}>
                          <span>{t.name}</span>
                          <button onClick={() => setTeachers(prev => prev.filter(x => x.id !== t.id))} style={{ background: "none", border: "none", color: "#ccc", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {activeAdminTab === "trainings" && (
              <div>
                <div style={{ background: "#fff", border: "1px solid #e5e8f0", borderRadius: 12, padding: "20px", marginBottom: 20 }}>
                  <h3 style={{ margin: "0 0 16px", fontSize: 15, color: "#333" }}>연수 등록</h3>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                    <input value={newTraining.name} onChange={e => setNewTraining(p => ({ ...p, name: e.target.value }))} placeholder="연수명 *" style={{ padding: "9px 12px", border: "1px solid #dde", borderRadius: 8, fontSize: 14, gridColumn: "1/-1" }} />
                    <input value={newTraining.org} onChange={e => setNewTraining(p => ({ ...p, org: e.target.value }))} placeholder="기관이름" style={{ padding: "9px 12px", border: "1px solid #dde", borderRadius: 8, fontSize: 14 }} />
                    <input type="date" value={newTraining.date} onChange={e => setNewTraining(p => ({ ...p, date: e.target.value }))} style={{ padding: "9px 12px", border: "1px solid #dde", borderRadius: 8, fontSize: 14 }} />
                    <input type="time" value={newTraining.time} onChange={e => setNewTraining(p => ({ ...p, time: e.target.value }))} placeholder="시간" style={{ padding: "9px 12px", border: "1px solid #dde", borderRadius: 8, fontSize: 14 }} />
                  </div>
                  <button onClick={addTraining} style={{ width: "100%", padding: "10px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, fontSize: 14 }}>연수 등록</button>
                </div>

                <h3 style={{ fontSize: 15, color: "#333", marginBottom: 12 }}>등록된 연수 목록 ({trainings.length})</h3>
                {trainings.length === 0 ? (
                  <p style={{ color: "#aaa", textAlign: "center", padding: 32 }}>등록된 연수가 없습니다</p>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                    {trainings.map(tr => {
                      const signedCnt = getSignedCount(tr.id);
                      const absentCnt = getAbsentCount(tr.id);
                      return (
                        <div key={tr.id} style={{ background: "#fff", border: "1px solid #e5e8f0", borderRadius: 12, padding: "16px 20px" }}>
                          {editTitleId === tr.id ? (
                            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                              <input value={editTitleVal} onChange={e => setEditTitleVal(e.target.value)} style={{ flex: 1, padding: "7px 10px", border: "1px solid #2c5faf", borderRadius: 6, fontSize: 14 }} />
                              <button onClick={() => saveEditTitle(tr.id)} style={{ padding: "7px 14px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13 }}>저장</button>
                              <button onClick={() => setEditTitleId(null)} style={{ padding: "7px 10px", background: "#f0f2f8", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13 }}>취소</button>
                            </div>
                          ) : (
                            <div style={{ marginBottom: 8 }}>
                              <h3 style={{ margin: "0 0 4px", fontSize: 16, color: "#1a2050" }}>{tr.name}</h3>
                              <p style={{ margin: 0, fontSize: 13, color: "#888" }}>{tr.org && `${tr.org} · `}{tr.date} {tr.time}</p>
                            </div>
                          )}
                          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                            <span style={{ fontSize: 12, padding: "3px 10px", background: "#eef6ee", color: "#2a762a", borderRadius: 12 }}>서명 {signedCnt}/{teachers.length}</span>
                            {absentCnt > 0 && <span style={{ fontSize: 12, padding: "3px 10px", background: "#fff4f0", color: "#c04020", borderRadius: 12 }}>불참 {absentCnt}</span>}
                          </div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            <button onClick={() => { setEditTitleId(tr.id); setEditTitleVal(tr.name); }} style={btnStyle}>✏️ 제목수정</button>
                            <button onClick={() => setTrainings(p => [...p])} style={btnStyle}>🔄 새로고침</button>
                            <button onClick={() => copyLink(tr)} style={{ ...btnStyle, background: copiedId === tr.id ? "#eef6ee" : undefined, color: copiedId === tr.id ? "#2a762a" : undefined }}>{copiedId === tr.id ? "✓ 복사됨" : "🔗 링크공유"}</button>
                            <button onClick={() => { setSelectedTraining(tr); setPage("teacherSign"); }} style={btnStyle}>📝 명단확인</button>
                            <button onClick={() => printResult(tr)} style={btnStyle}>🖨️ 결과출력</button>
                            <button onClick={() => deleteTraining(tr.id)} style={{ ...btnStyle, color: "#c03020", borderColor: "#f5c4b3" }}>🗑️ 삭제</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {activeAdminTab === "results" && (
              <div>
                <h3 style={{ fontSize: 15, color: "#333", marginBottom: 16 }}>실시간 서명 현황</h3>
                {trainings.length === 0 ? (
                  <p style={{ color: "#aaa", textAlign: "center", padding: 32 }}>등록된 연수가 없습니다</p>
                ) : trainings.map(tr => {
                  const signedCnt = getSignedCount(tr.id);
                  const total = teachers.length;
                  const pct = total > 0 ? Math.round((signedCnt / total) * 100) : 0;
                  return (
                    <div key={tr.id} style={{ background: "#fff", border: "1px solid #e5e8f0", borderRadius: 12, padding: "16px 20px", marginBottom: 14 }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                        <div>
                          <h4 style={{ margin: "0 0 2px", fontSize: 15, color: "#1a2050" }}>{tr.name}</h4>
                          <p style={{ margin: 0, fontSize: 12, color: "#888" }}>{tr.date} {tr.time}</p>
                        </div>
                        <span style={{ fontSize: 18, fontWeight: 600, color: "#2c5faf" }}>{pct}%</span>
                      </div>
                      <div style={{ background: "#f0f2f8", borderRadius: 6, height: 8, marginBottom: 12, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, background: "#2c5faf", height: "100%", borderRadius: 6, transition: "width 0.3s" }} />
                      </div>
                      {teachers.length > 0 && (
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(120px,1fr))", gap: 6 }}>
                          {teachers.map(t => {
                            const k = getSigKey(tr.id, t.name);
                            const s = signatures[k];
                            const signed = !!s?.sig;
                            const absent = !!s?.absenceReason && !s?.sig;
                            return (
                              <div key={t.id} style={{ padding: "6px 10px", background: signed ? "#eef6ee" : absent ? "#fff4f0" : "#f8f9fc", border: `1px solid ${signed ? "#a8d5a8" : absent ? "#f5c4b3" : "#e5e8f0"}`, borderRadius: 8, fontSize: 13 }}>
                                <div style={{ fontWeight: 500, color: "#222", marginBottom: 2 }}>{t.name}</div>
                                <div style={{ fontSize: 11, color: signed ? "#2a762a" : absent ? "#c04020" : "#aaa" }}>
                                  {signed ? "✓ 서명완료" : absent ? `✗ ${s.absenceReason}` : "미서명"}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "40px 20px" }}>
          <div style={{ textAlign: "center", marginBottom: 40 }}>
            <div style={{ width: 64, height: 64, background: "linear-gradient(135deg,#2c5faf,#1a3880)", borderRadius: 18, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, margin: "0 auto 16px" }}>📋</div>
            <h1 style={{ margin: "0 0 6px", fontSize: 24, color: "#1a2050", fontWeight: 600 }}>교직원 연수 등록부</h1>
            <p style={{ margin: 0, color: "#888", fontSize: 14 }}>연수 전자 서명 시스템</p>
          </div>

          {trainings.length > 0 && (
            <div style={{ marginBottom: 32 }}>
              <p style={{ fontSize: 13, color: "#666", marginBottom: 12 }}>진행 중인 연수를 선택하세요</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {trainings.slice(0, 5).map(tr => (
                  <button key={tr.id} onClick={() => { setSelectedTraining(tr); setPage("teacherSign"); }}
                    style={{ padding: "16px 20px", background: "#fff", border: "1px solid #dde1f0", borderRadius: 12, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
                    <p style={{ margin: "0 0 4px", fontWeight: 500, fontSize: 15, color: "#1a2050" }}>{tr.name}</p>
                    <p style={{ margin: 0, fontSize: 12, color: "#888" }}>{tr.org && `${tr.org} · `}{tr.date} {tr.time}</p>
                  </button>
                ))}
              </div>
            </div>
          )}

          <div style={{ borderTop: "1px solid #e5e8f0", paddingTop: 24 }}>
            {!adminLoggedIn ? (
              <div>
                <p style={{ fontSize: 13, color: "#888", marginBottom: 12, textAlign: "center" }}>관리자 모드</p>
                <div style={{ display: "flex", gap: 8 }}>
                  <input type="password" value={adminPw} onChange={e => setAdminPw(e.target.value)} onKeyDown={e => e.key === "Enter" && handleAdminLogin()} placeholder="관리자 비밀번호" style={{ flex: 1, padding: "10px 14px", border: `1px solid ${pwError ? "#e06030" : "#dde"}`, borderRadius: 8, fontSize: 14 }} />
                  <button onClick={handleAdminLogin} style={{ padding: "10px 18px", background: "#1a3880", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 500 }}>입장</button>
                </div>
                {pwError && <p style={{ color: "#e06030", fontSize: 12, marginTop: 6 }}>비밀번호가 올바르지 않습니다 (기본: admin1234)</p>}
              </div>
            ) : (
              <button onClick={() => setPage("admin")} style={{ width: "100%", padding: "12px", background: "#1a3880", color: "#fff", border: "none", borderRadius: 10, cursor: "pointer", fontSize: 15, fontWeight: 500 }}>관리자 대시보드 입장 →</button>
            )}
          </div>
        </div>
      );
    }

    const btnStyle = { padding: "6px 12px", background: "#f8f9fc", border: "1px solid #e5e8f0", borderRadius: 7, cursor: "pointer", fontSize: 12, color: "#444" };

    // 화면에 앱 그리기
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
