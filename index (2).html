<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<body>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // 파이어베이스 초기화 (import 충돌 없는 안전한 방식)
    const firebaseConfig = {
      apiKey: "AIzaSyDZ8Ljhd3yWHLWycPYnFO8eYnK1xWenIOY",
      authDomain: "sign-e8e62.firebaseapp.com",

      storageBucket: "sign-e8e62.firebasestorage.app",
      messagingSenderId: "1060197129585",
      appId: "1:1060197129585:web:c6cce61a15d73ad4e1ead0"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    const ADMIN_PASSWORD = "admin1234";
    const ABSENCE_REASONS = ["출장", "병가", "연가", "조퇴", "공가", "육아시간"];

    // 파이어스토어 실시간 연동 훅
    function useStorage(key, defaultVal) {
      const [val, setVal] = useState(defaultVal);

      useEffect(() => {
        const docRef = db.collection("registry").doc(key);
        const unsubscribe = docRef.onSnapshot((docSnap) => {
          if (docSnap.exists) {
            setVal(docSnap.data().value);
          } else {
            setVal(defaultVal);
          }
        });
        return () => unsubscribe();
      }, [key, defaultVal]);

      const save = useCallback(async (v) => {
        const next = typeof v === "function" ? v(val) : v;
        setVal(next); 
        try {
          await db.collection("registry").doc(key).set({ value: next }, { merge: true });
        } catch (error) {
          console.error("데이터 저장 실패:", error);
        }
      }, [key, val]);

      return [val, save];
    }

    function SignatureCanvas({ onSave, onClear, existingSig }) {
      const canvasRef = useRef(null);
      const drawing = useRef(false);
      const lastPos = useRef(null);

      useEffect(() => {
        if (existingSig && canvasRef.current) {
          const img = new Image();
          img.onload = () => {
            const ctx = canvasRef.current.getContext("2d");
            ctx.clearRect(0, 0, 400, 160);
            ctx.drawImage(img, 0, 0);
          };
          img.src = existingSig;
        }
      }, [existingSig]);

      const getPos = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        if (e.touches) {
          return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
        }
        return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
      };

      const startDraw = (e) => {
        e.preventDefault();
        drawing.current = true;
        const pos = getPos(e, canvasRef.current);
        lastPos.current = pos;
      };

      const draw = (e) => {
        e.preventDefault();
        if (!drawing.current) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext("2d");
        const pos = getPos(e, canvas);
        ctx.beginPath();
        ctx.moveTo(lastPos.current.x, lastPos.current.y);
        ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = "#1a1a2e";
        ctx.lineWidth = 2.5;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
        lastPos.current = pos;
      };

      const endDraw = () => { drawing.current = false; };

      const clear = () => {
        const ctx = canvasRef.current.getContext("2d");
        ctx.clearRect(0, 0, 400, 160);
        onClear && onClear();
      };

      const save = () => {
        const data = canvasRef.current.toDataURL("image/png");
        onSave(data);
      };

      return (
        <div>
          <canvas
            ref={canvasRef}
            width={400}
            height={160}
            style={{ border: "1px solid #c8d0e0", borderRadius: 8, touchAction: "none", cursor: "crosshair", width: "100%", background: "#f8f9fb" }}
            onMouseDown={startDraw}
            onMouseMove={draw}
            onMouseUp={endDraw}
            onMouseLeave={endDraw}
            onTouchStart={startDraw}
            onTouchMove={draw}
            onTouchEnd={endDraw}
          />
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
            <button onClick={clear} style={{ flex: 1, padding: "8px", background: "#f0f2f5", border: "1px solid #dde1e9", borderRadius: 8, cursor: "pointer", fontSize: 13 }}>지우기</button>
            <button onClick={save} style={{ flex: 2, padding: "8px", background: "#2c5faf", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 500 }}>서명 저장</button>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("home");
      const [adminLoggedIn, setAdminLoggedIn] = useState(false);
      const [adminPw, setAdminPw] = useState("");
      const [pwError, setPwError] = useState(false);
      
      const [teachers, setTeachers] = useStorage("teachers_v2", []);
      const [trainings, setTrainings] = useStorage("trainings_v2", []);
      const [signatures, setSignatures] = useStorage("signatures_v2", {});
      
      const [newTraining, setNewTraining] = useState({ name: "", org: "", date: "", time: "" });
      const [editTitleId, setEditTitleId] = useState(null);
      const [editTitleVal, setEditTitleVal] = useState("");
      const [selectedTraining, setSelectedTraining] = useState(null);
      const [selectedTeacher, setSelectedTeacher] = useState(null);
      const [absenceReason, setAbsenceReason] = useState("");
      const [sigSaved, setSigSaved] = useState(false);
      const [uploadError, setUploadError] = useState("");
      const [activeAdminTab, setActiveAdminTab] = useState("teachers");
      const [copiedId, setCopiedId] = useState(null);
      const [newTeacherName, setNewTeacherName] = useState("");

      const urlParams = new URLSearchParams(window.location.search);
      const sharedTrainingId = urlParams.get("training");

      useEffect(() => {
        if (sharedTrainingId) {
          setPage("sharedTraining");
        }
      }, [sharedTrainingId]);

      const getSigKey = (tId, tName) => `${tId}__${tName}`;

      const handleAdminLogin = () => {
        if (adminPw === ADMIN_PASSWORD) {
          setAdminLoggedIn(true);
          setPage("admin");
          setPwError(false);
        } else {
          setPwError(true);
        }
      };

      const addTraining = () => {
        if (!newTraining.name || !newTraining.date) return;
        const t = { ...newTraining, id: Date.now().toString(), createdAt: new Date().toISOString() };
        setTrainings(prev => [t, ...prev]);
        setNewTraining({ name: "", org: "", date: "", time: "" });
      };

      const deleteTraining = (id) => {
        if (confirm("연수를 삭제하시겠습니까?")) setTrainings(prev => prev.filter(t => t.id !== id));
      };

      const saveEditTitle = (id) => {
        setTrainings(prev => prev.map(t => t.id === id ? { ...t, name: editTitleVal } : t));
        setEditTitleId(null);
      };

      const getTrainingLink = (training) => {
        const url = new URL(window.location.href.split("?")[0]);
        url.searchParams.set("training", training.id);
        return url.toString();
      };

      const copyLink = async (training) => {
        try {
          await navigator.clipboard.writeText(getTrainingLink(training));
          setCopiedId(training.id);
          setTimeout(() => setCopiedId(null), 2000);
        } catch { alert(getTrainingLink(training)); }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setUploadError("");
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const lines = ev.target.result.split("\n").map(l => l.trim()).filter(Boolean);
            if (lines.length === 0) { setUploadError("파일에 데이터가 없습니다."); return; }
            
            // 첫 번째 줄에 헤더(순번, 직위, 성명 등) 단어가 포함되어 있으면 제외 처리
            const firstLineCells = lines[0].split(",");
            const hasHeader = firstLineCells.some(cell => cell.includes("순번") || cell.includes("직위") || cell.includes("성명") || cell.includes("이름"));
            const dataLines = hasHeader ? lines.slice(1) : lines;

            const parsedTeachers = dataLines.map((line, i) => {
              const cells = line.split(",").map(c => c.trim());
              
              if (cells.length === 1) {
                return { id: `t${Date.now()}${i}`, no: (i + 1).toString(), position: "교사", name: cells[0] };
              }
              
              return {
                id: `t${Date.now()}${i}`,
                no: cells[0] || (i + 1).toString(),
                position: cells[1] || "교사",
                name: cells[2] || cells[0]
              };
            }).filter(t => t.name);

            if (parsedTeachers.length === 0) { setUploadError("등록할 수 있는 교직원 정보가 없습니다."); return; }
            setTeachers(parsedTeachers);
          } catch { setUploadError("파일 파싱 중 오류가 발생했습니다."); }
        };
        reader.readAsText(file);
      };

      const downloadTemplate = () => {
        const content = "순번,직위,성명\n1,교사,홍길동\n2,부장교사,김철수\n3,교감,이영희\n4,교장,박민준";
        const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "교직원명단_양식.csv";
        a.click();
      };

      const saveSignature = async (sig) => {
        const key = getSigKey(selectedTraining.id, selectedTeacher.name);
        await setSignatures(prev => ({ ...prev, [key]: { sig, absenceReason, timestamp: new Date().toISOString() } }));
        setSigSaved(true);
      };

      const getSignedCount = (trainingId) => {
        return teachers.filter(t => {
          const k = getSigKey(trainingId, t.name);
          return signatures[k]?.sig;
        }).length;
      };

      const getAbsentCount = (trainingId) => {
        return teachers.filter(t => {
          const k = getSigKey(trainingId, t.name);
          return signatures[k]?.absenceReason && !signatures[k]?.sig;
        }).length;
      };

      const printResult = (training) => {
        const rows = teachers.map(t => {
          const k = getSigKey(training.id, t.name);
          const s = signatures[k];
          return `<tr>
            <td style="text-align:center;">${t.no || "-"}</td>
            <td style="text-align:center;">${t.position || "-"}</td>
            <td style="text-align:center;">${t.name}</td>
            <td style="text-align:center; height:50px;">${s?.sig ? `<img src="${s.sig}" height="40"/>` : "-"}</td>
            <td style="text-align:center;">${s?.absenceReason || (s?.sig ? "참석" : "-")}</td>
          </tr>`;
        }).join("");
        
        const w = window.open("", "_blank");
        w.document.write(`<html><head><title>${training.name} 서명부</title>
          <style>
            body{font-family:sans-serif;padding:20px; color:#222;}
            table{border-collapse:collapse;width:100%;margin-top:20px;}
            th,td{border:1px solid #333;padding:10px;}
            th{background:#f0f4ff; font-weight:bold;}
            h2{margin-bottom:5px; color:#1a2050;}
            p{margin:5px 0; color:#555;}
          </style></head><body>
          <h2>${training.name} 결과 서명부</h2>
          <p>기관/장소: ${training.org || "-"} | 일시: ${training.date} ${training.time || ""}</p>
          <table>
            <thead>
              <tr>
                <th style="width:10%;">순번</th>
                <th style="width:20%;">직위</th>
                <th style="width:20%;">성명</th>
                <th style="width:30%;">서명</th>
                <th style="width:20%;">비고</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </body></html>`);
        w.document.close();
        w.print();
      };

      const currentTrainingObj = sharedTrainingId ? trainings.find(t => t.id === sharedTrainingId) : selectedTraining;

      if (page === "sharedTraining" || (page === "teacherSign" && currentTrainingObj)) {

          </div>
        );

        if (selectedTeacher) {
          const key = getSigKey(training.id, selectedTeacher.name);
          const existing = signatures[key];
          return (
            <div style={{ maxWidth: 480, margin: "0 auto", padding: "24px 16px" }}>
              <button onClick={() => { setSelectedTeacher(null); setSigSaved(false); setAbsenceReason(""); }} style={{ background: "none", border: "none", color: "#2c5faf", cursor: "pointer", fontSize: 14, marginBottom: 16 }}>← 명단으로</button>
              <div style={{ background: "#f0f4ff", borderRadius: 12, padding: "16px 20px", marginBottom: 20 }}>
                <p style={{ fontSize: 12, color: "#6b7aaa", margin: 0 }}>{training.name}</p>
                <h2 style={{ margin: "4px 0 0", fontSize: 20, color: "#1a2050" }}>{selectedTeacher.name} ({selectedTeacher.position || "교사"}) 선생님</h2>
              </div>

              {sigSaved ? (
                <div style={{ textAlign: "center", padding: 32 }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
                  <p style={{ color: "#2c5faf", fontWeight: 500, fontSize:
